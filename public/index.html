<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Raycaster</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #0f0f1a;
      font-family: 'Segoe UI', sans-serif;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    /* ── Non-fullscreen: original centred stack layout ───────────── */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    /*
      Canvas display size:
        width = smaller of (viewport - padding) OR (available-height-above-pad × 2)
        aspect-ratio keeps height exactly half of width.
      --ctrl-h tracks the rough height of the pad area (2 rows × key-size + gaps + padding).
    */
    :root {
      --key-size: clamp(44px, min(14vw, 15vh), 82px);
      --key-gap: clamp(5px, 1vw, 12px);
      --ctrl-h: calc(var(--key-size) * 2 + var(--key-gap) + 40px);
    }

    #c {
      display: block;
      aspect-ratio: 2 / 1;
      /* fit viewport width, but also ensure it doesn't push controls off-screen */
      width: min(calc(100vw - 40px),
          calc((100vh - var(--ctrl-h) - 60px) * 2));
      border-radius: 4px;
      /* image-rendering keeps pixel art crisp when CSS scales it down */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* ── WASD pad — normal flow below canvas ─────────────────────── */
    .wasd-pad {
      display: grid;
      grid-template-areas:
        ".  w  ."
        "a  s  d";
      grid-template-columns: repeat(3, var(--key-size));
      grid-template-rows: repeat(2, var(--key-size));
      gap: var(--key-gap);
      flex-shrink: 0;
    }

    .key {
      position: relative;
      border-radius: 12px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: linear-gradient(145deg, #1e1e3a, #13132a);
      border: 1px solid #3a3a6a;
      box-shadow:
        0 6px 0 #0a0a18,
        0 8px 16px #00000060,
        inset 0 1px 0 #ffffff12;
      transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.08s ease;
    }

    .key[data-key="w"] {
      grid-area: w;
    }

    .key[data-key="a"] {
      grid-area: a;
    }

    .key[data-key="s"] {
      grid-area: s;
    }

    .key[data-key="d"] {
      grid-area: d;
    }

    .key .label {
      font-size: clamp(1rem, min(3.5vw, 3.5vh), 1.7rem);
      font-weight: 700;
      color: #c0c8ff;
      text-shadow: 0 0 8px #7b8cff66;
      transition: color 0.08s;
    }

    .key .hint {
      font-size: clamp(0.38rem, min(1vw, 1vh), 0.58rem);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #5a5a88;
    }

    .key .arrow {
      position: absolute;
      top: 7px;
      font-size: clamp(0.7rem, min(2vw, 2vh), 1.3rem);
      opacity: 0.22;
      color: #fff;
    }

    .key.pressed {
      transform: translateY(4px);
      box-shadow:
        0 2px 0 #0a0a18,
        0 4px 8px #00000060,
        inset 0 2px 6px #00000040,
        0 0 20px #7b8cff66;
      background: linear-gradient(145deg, #2a2a55, #1a1a3a);
      border-color: #7b8cff;
    }

    .key.pressed .label {
      color: #fff;
      text-shadow: 0 0 12px #7b8cffcc;
    }

    .key.pressed .hint {
      color: #9090cc;
    }

    @keyframes ripple {
      from {
        opacity: 0.6;
        transform: scale(0.8);
      }

      to {
        opacity: 0;
        transform: scale(2.2);
      }
    }

    .ripple {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      border: 2px solid #7b8cff;
      animation: ripple 0.4s ease-out forwards;
      pointer-events: none;
    }

    /* ── Fullscreen button — always top-right of viewport ────────── */
    #fs-btn {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 100;
      width: 40px;
      height: 40px;
      cursor: pointer;
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      background: rgba(10, 10, 28, 0.60);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: rgba(180, 190, 255, 0.80);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #fs-btn:hover,
    #fs-btn.active {
      background: rgba(40, 40, 90, 0.80);
      border-color: rgba(123, 140, 255, 0.60);
      color: #a8b4ff;
    }

    /* ════════════════════════════════════════════════════════════════
       FULLSCREEN OVERRIDES
       ══════════════════════════════════════════════════════════════ */

    /*
      In fullscreen the page fills the screen.  Canvas expands to fill
      the full available space (still 2:1 — letterboxed if the screen
      is not exactly 2:1).  Controls become a floating overlay so the
      canvas can use every available pixel.
    */
    body.is-fullscreen {
      justify-content: center;
      padding: 0;
      gap: 0;
      background: #000;
      overflow: hidden;
      position: fixed;
      inset: 0;
    }

    body.is-fullscreen #c {
      /* Fill as much of the screen as possible, letterboxed to 2:1 */
      width: min(100vw, calc(100vh * 2));
      /* aspect-ratio handles height automatically */
    }

    /* Controls: detach from normal flow and float bottom-left */
    body.is-fullscreen .wasd-pad {
      position: fixed;
      bottom: clamp(12px, 3vh, 28px);
      left: clamp(12px, 3vw, 28px);
      z-index: 50;
    }
  </style>
</head>

<body>

  <canvas id="c"></canvas>

  <div class="wasd-pad">
    <div class="key" data-key="w" tabindex="0">
      <span class="arrow">▲</span>
      <span class="label">W</span>
      <span class="hint">Forward</span>
    </div>
    <div class="key" data-key="a" tabindex="0">
      <span class="arrow">◀</span>
      <span class="label">A</span>
      <span class="hint">Left</span>
    </div>
    <div class="key" data-key="s" tabindex="0">
      <span class="arrow">▼</span>
      <span class="label">S</span>
      <span class="hint">Back</span>
    </div>
    <div class="key" data-key="d" tabindex="0">
      <span class="arrow">▶</span>
      <span class="label">D</span>
      <span class="hint">Right</span>
    </div>
  </div>

  <!-- Fullscreen toggle -->
  <button id="fs-btn" title="Toggle fullscreen" aria-label="Toggle fullscreen">
    <svg id="fs-icon" width="16" height="16" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8"
      stroke-linecap="round" stroke-linejoin="round">
      <polyline points="1,6 1,1 6,1" />
      <polyline points="12,1 17,1 17,6" />
      <polyline points="17,12 17,17 12,17" />
      <polyline points="6,17 1,17 1,12" />
    </svg>
  </button>

  <script>
    (function () {
      const btn = document.getElementById('fs-btn');
      const icon = document.getElementById('fs-icon');

      // Polylines for expand vs compress icons
      const EXPAND = 'M1,6 1,1 6,1 M12,1 17,1 17,6 M17,12 17,17 12,17 M6,17 1,17 1,12';
      const COMPRESS = 'M6,1 1,1 1,6 M17,6 17,1 12,1 M12,17 17,17 17,12 M1,12 1,17 6,17';

      function setIcon(compress) {
        icon.querySelectorAll('polyline').forEach((p, i) => {
          const segments = (compress ? COMPRESS : EXPAND).split(' M');
          p.setAttribute('points', (i === 0 ? segments[0] : 'M' + segments[i]).replace(/^M/, ''));
        });
      }

      btn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen({navigationUI: 'hide'})
            .then(() => {
              screen.orientation?.lock?.('landscape').catch(() => { });
            })
            .catch(err => console.warn('Fullscreen failed:', err));
        } else {
          document.exitFullscreen().catch(() => { });
        }
      });

      document.addEventListener('fullscreenchange', () => {
        const active = !!document.fullscreenElement;
        document.body.classList.toggle('is-fullscreen', active);
        btn.classList.toggle('active', active);
        setIcon(active);
        btn.title = active ? 'Exit fullscreen' : 'Toggle fullscreen';
      });
    })();
  </script>

  <script type="module" src="main.js"></script>
</body>

</html>
