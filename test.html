<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WASD Controller</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', sans-serif;
    }

    h1 {
      margin-bottom: 12px;
      font-size: 1.4rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #7b8cff;
      text-shadow: 0 0 12px #7b8cff88;
    }

    #log {
      margin-bottom: 32px;
      width: 280px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: #1a1a2e;
      border: 1px solid #2e2e55;
      font-size: 0.85rem;
      letter-spacing: 1px;
      color: #a0a8ff;
      transition: color 0.15s, box-shadow 0.15s;
    }

    #log.active {
      color: #00ffcc;
      box-shadow: 0 0 14px #00ffcc55;
    }

    .wasd-pad {
      display: grid;
      grid-template-areas: ".  w  ." "a  s  d";
      grid-template-columns: repeat(3, 72px);
      grid-template-rows: repeat(2, 72px);
      gap: 8px;
    }

    .key {
      position: relative;
      border-radius: 12px;
      cursor: pointer;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: linear-gradient(145deg, #1e1e3a, #13132a);
      border: 1px solid #3a3a6a;
      box-shadow: 0 6px 0 #0a0a18, 0 8px 16px #00000060, inset 0 1px 0 #ffffff12;
      transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.08s ease;
    }

    .key[data-key="w"] {
      grid-area: w;
    }

    .key[data-key="a"] {
      grid-area: a;
    }

    .key[data-key="s"] {
      grid-area: s;
    }

    .key[data-key="d"] {
      grid-area: d;
    }

    .key .label {
      font-size: 1.5rem;
      font-weight: 700;
      color: #c0c8ff;
      text-shadow: 0 0 8px #7b8cff66;
      transition: color 0.08s;
    }

    .key .hint {
      font-size: 0.55rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #5a5a88;
    }

    .key .arrow {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 0.6rem;
      opacity: 0.25;
      color: #fff;
    }

    .key.pressed {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #0a0a18, 0 4px 8px #00000060,
        inset 0 2px 6px #00000040, 0 0 20px #7b8cff66;
      background: linear-gradient(145deg, #2a2a55, #1a1a3a);
      border-color: #7b8cff;
    }

    .key.pressed .label {
      color: #fff;
      text-shadow: 0 0 12px #7b8cffcc;
    }

    .key.pressed .hint {
      color: #9090cc;
    }

    @keyframes ripple {
      from {
        opacity: 0.6;
        transform: scale(0.8);
      }

      to {
        opacity: 0;
        transform: scale(2.2);
      }
    }

    .ripple {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      border: 2px solid #7b8cff;
      animation: ripple 0.4s ease-out forwards;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <h1>WASD Controller</h1>
  <div id="log">Press a key…</div>

  <div class="wasd-pad">
    <div class="key" data-key="w" tabindex="0">
      <span class="arrow">▲</span><span class="label">W</span><span class="hint">Forward</span>
    </div>
    <div class="key" data-key="a" tabindex="0">
      <span class="arrow">◀</span><span class="label">A</span><span class="hint">Left</span>
    </div>
    <div class="key" data-key="s" tabindex="0">
      <span class="arrow">▼</span><span class="label">S</span><span class="hint">Back</span>
    </div>
    <div class="key" data-key="d" tabindex="0">
      <span class="arrow">▶</span><span class="label">D</span><span class="hint">Right</span>
    </div>
  </div>

  <script>
    // ── Lightweight event emitter (the "signal" system) ──
    const EventBus = {
      listeners: {},
      on(event, cb) {(this.listeners[event] = this.listeners[event] || []).push(cb);},
      emit(event, data) {(this.listeners[event] || []).forEach(cb => cb(data));}
    };

    const log = document.getElementById('log');
    const keys = document.querySelectorAll('.key');
    const keyMap = {};   // prevents key-repeat flooding

    function getKeyEl(k) {
      return document.querySelector('.key[data-key="' + k.toLowerCase() + '"]');
    }

    function pressKey(keyEl, source) {
      if (!keyEl) return;
      const k = keyEl.dataset.key;
      if (keyMap[k]) return;          // already held down
      keyMap[k] = true;
      keyEl.classList.add('pressed');

      // Visual ripple
      r = document.createElement('div');
      r.className = 'ripple';
      keyEl.appendChild(r);
      r.addEventListener('animationend', () => r.remove());

      // Emit signal
      EventBus.emit('keypress', {key: k.toUpperCase(), source, timestamp: Date.now()});
    }

    function releaseKey(keyEl) {
      if (!keyEl) return;
      const k = keyEl.dataset.key;
      keyMap[k] = false;
      keyEl.classList.remove('pressed');
      EventBus.emit('keyrelease', {key: k.toUpperCase(), timestamp: Date.now()});
    }

    // ── Consume emitted signals ──
    const dirMap = {W: '▲ Forward', A: '◀ Left', S: '▼ Backward', D: '▶ Right'};
    let logTimer;

    EventBus.on('keypress', ({key, source}) => {
      log.textContent = '[ ' + key + ' ]  ' + dirMap[key] + '  •  via ' + source;
      log.classList.add('active');
      clearTimeout(logTimer);
    });

    EventBus.on('keyrelease', ({key}) => {
      log.textContent = 'Released: ' + key;
      log.classList.remove('active');
      logTimer = setTimeout(() => {log.textContent = 'Press a key…';}, 800);
    });

    // ── Wire up mouse / touch ──
    keys.forEach(keyEl => {
      keyEl.addEventListener('mousedown', () => pressKey(keyEl, 'mouse'));
      keyEl.addEventListener('touchstart', e => {e.preventDefault(); pressKey(keyEl, 'touch');}, {passive: false});
      keyEl.addEventListener('mouseup', () => releaseKey(keyEl));
      keyEl.addEventListener('mouseleave', () => releaseKey(keyEl));
      keyEl.addEventListener('touchend', () => releaseKey(keyEl));
    });

    // ── Wire up physical keyboard ──
    document.addEventListener('keydown', e => {
      const el = getKeyEl(e.key);
      if (el) {e.preventDefault(); pressKey(el, 'keyboard');}
    });
    document.addEventListener('keyup', e => {
      const el = getKeyEl(e.key);
      if (el) releaseKey(el);
    });
  </script>
</body>

</html>
